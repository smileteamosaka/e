<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Widget</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100%;
            overflow: hidden; /* prevent page scroll entirely */
            touch-action: none; /* prevent mobile page scroll */
        }

        .chat-widget {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
        }

        /* Header */
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: linear-gradient(90deg, #000000 0%, #0d0d0d 100%);
            border-bottom: 2px solid #FFD700;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.15);
        }

        .chat-header-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* 3D Avatar Canvas */
        #avatar-canvas-wrap {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #FFD700;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
            overflow: hidden;
            cursor: grab;
            flex-shrink: 0;
            background: #111;
            position: relative;
        }

        #avatar-canvas-wrap:active {
            cursor: grabbing;
        }

        #avatar-canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
        }

        .chat-title-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chat-title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #FFD700;
            letter-spacing: 0.5px;
        }

        .chat-subtitle {
            margin: 0;
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .reset-btn {
            background: #FFD700;
            color: #000000;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
            font-size: 20px;
        }

        .reset-btn:hover { transform: scale(1.1); box-shadow: 0 6px 16px rgba(255, 215, 0, 0.5); }
        .reset-btn:active { transform: scale(0.95); }

        /* Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: linear-gradient(180deg, #000000 0%, #0a0a0a 100%);
            touch-action: pan-y; /* allow vertical scroll only inside here */
            overscroll-behavior: contain;
        }

        .chat-messages::-webkit-scrollbar { width: 8px; }
        .chat-messages::-webkit-scrollbar-track { background: #1a1a1a; }
        .chat-messages::-webkit-scrollbar-thumb { background: #FFD700; border-radius: 4px; }
        .chat-messages::-webkit-scrollbar-thumb:hover { background: #ffed4e; }

        .chat-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
            color: #666;
        }

        .empty-icon { color: #FFD700; opacity: 0.6; font-size: 40px; }

        .empty-label {
            font-size: 15px;
            color: #888;
            letter-spacing: 0.5px;
        }

        .prompt-templates {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 320px;
        }

        .prompt-btn {
            background: transparent;
            border: 1px solid #FFD700;
            color: #FFD700;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            text-align: left;
            transition: all 0.18s ease;
            line-height: 1.4;
        }

        .prompt-btn:hover {
            background: rgba(255, 215, 0, 0.12);
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.25);
            transform: translateX(3px);
        }

        .prompt-btn:active {
            transform: translateX(1px);
            background: rgba(255, 215, 0, 0.2);
        }

        .chat-message {
            display: flex;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-user { justify-content: flex-end; }
        .message-assistant { justify-content: flex-start; }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
        }

        .message-user .message-bubble {
            background: #FFD700;
            color: #000000;
            font-weight: 500;
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.2);
        }

        .message-assistant .message-bubble {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #FFD700;
            border-bottom-left-radius: 2px;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.1);
        }

        .message-bubble.loading {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 12px 18px;
        }

        .message-bubble.loading span {
            width: 8px;
            height: 8px;
            background: #FFD700;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .message-bubble.loading span:nth-child(1) { animation-delay: -0.32s; }
        .message-bubble.loading span:nth-child(2) { animation-delay: -0.16s; }
        .message-bubble.loading span:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Form */
        .chat-form {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            background: linear-gradient(90deg, #000000 0%, #0d0d0d 100%);
            border-top: 2px solid #FFD700;
            box-shadow: 0 -4px 12px rgba(255, 215, 0, 0.1);
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #FFD700;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }

        .chat-input:focus {
            border-color: #ffed4e;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
            background: #242424;
        }

        .chat-input::placeholder { color: #666; }
        .chat-input:disabled { opacity: 0.6; cursor: not-allowed; }

        .send-btn {
            padding: 12px 16px;
            background: #FFD700;
            color: #000000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
            font-size: 18px;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 215, 0, 0.5);
            background: #ffed4e;
        }

        .send-btn:active:not(:disabled) { transform: translateY(0); }
        .send-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        @media (max-width: 768px) {
            .chat-widget { border-radius: 0; }
            .message-bubble { max-width: 85%; }
            .chat-header { padding: 16px; }
            .chat-messages { padding: 16px; }
            .chat-form { padding: 12px 16px; }
        }
    </style>
</head>
<body>
<div class="chat-widget">
    <div class="chat-header">
        <div class="chat-header-content">
            <!-- 3D Avatar -->
            <div id="avatar-canvas-wrap">
                <canvas id="avatar-canvas"></canvas>
            </div>
            <div class="chat-title-group">
                <h2 class="chat-title">スマイリーちゃん</h2>
                <p class="chat-subtitle">スマイル英会話のアシスタント</p>
            </div>
        </div>
        <button class="reset-btn" title="Clear chat history">🔄</button>
    </div>

    <div class="chat-messages">
    </div>

    <form class="chat-form">
        <input type="text" class="chat-input" placeholder="メッセージを入力してください…" />
        <button type="submit" class="send-btn">📤</button>
    </form>
</div>

<!-- Three.js + GLTFLoader from CDN -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── Audio ───────────────────────────────────────────────────────────────────
const AUDIO_FILES = [
    'https://raw.githubusercontent.com/TheDepression/Sounds/main/ooh.m4a',
    'https://raw.githubusercontent.com/TheDepression/Sounds/main/wee.m4a'
];

function playRandomAudio() {
    // Let current audio finish — don't interrupt mid-play
    if (currentAudio && !currentAudio.ended && !currentAudio.paused) return;
    const url = AUDIO_FILES[Math.floor(Math.random() * AUDIO_FILES.length)];
    currentAudio = new Audio(url);
    currentAudio.volume = 0.6;
    currentAudio.play().catch(() => {});
}

// ─── Three.js Avatar Setup ───────────────────────────────────────────────────
const wrap = document.getElementById('avatar-canvas-wrap');
const canvas = document.getElementById('avatar-canvas');
const SIZE = 48 * window.devicePixelRatio;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(48, 48);
renderer.setClearColor(0x000000, 0);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 2.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
camera.position.set(0, 0, 2.5);

// Lighting — boosted for golden glimmer on black bg
const ambient = new THREE.AmbientLight(0xfff5cc, 2.5);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xFFD700, 6.0);
dirLight.position.set(2, 3, 4);
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0xffffff, 1.5);
fillLight.position.set(-2, -1, 2);
scene.add(fillLight);
// Rim light from behind-top for glimmer pop
const rimLight = new THREE.DirectionalLight(0xFFE566, 3.0);
rimLight.position.set(0, 2, -3);
scene.add(rimLight);

let model = null;
let isLoading = false; // AI loading state — horizontal auto-spin
let autoSpinAngle = 0;
let returningToFront = false;

// Mouse drag state
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotX = 0, rotY = 0;
let velX = 0, velY = 0;
let currentAudio = null;

// Load GLB
const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/TheDepression/Photos/main/smile.glb',
    (gltf) => {
        model = gltf.scene;

        // Center & fit model
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 1.6 / maxDim;
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));
        // Fine-tune: shift left and up to visually center within the circle
        model.position.x -= 0.12;
        model.position.y += 0.12;

        scene.add(model);
    },
    undefined,
    (err) => {
        console.warn('GLB load error:', err);
        // Fallback: golden sphere
        const geo = new THREE.SphereGeometry(0.8, 32, 32);
        const mat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.3, roughness: 0.4 });
        model = new THREE.Mesh(geo, mat);
        scene.add(model);
    }
);

// ─── Drag Interaction ────────────────────────────────────────────────────────
wrap.addEventListener('mousedown', (e) => {
    isDragging = true;
    returningToFront = false;
    prevMouse = { x: e.clientX, y: e.clientY };
    velX = 0; velY = 0;
    playRandomAudio();
    e.preventDefault();
});

wrap.addEventListener('touchstart', (e) => {
    isDragging = true;
    returningToFront = false;
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    velX = 0; velY = 0;
    playRandomAudio();
    e.preventDefault();
}, { passive: false });

document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - prevMouse.x;
    const dy = e.clientY - prevMouse.y;
    velX = dx * 0.025;
    velY = dy * 0.025;
    rotY += velX;
    rotX += velY;
    rotX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotX));
    prevMouse = { x: e.clientX, y: e.clientY };
});

document.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    e.preventDefault();
    const dx = e.touches[0].clientX - prevMouse.x;
    const dy = e.touches[0].clientY - prevMouse.y;
    velX = dx * 0.025;
    velY = dy * 0.025;
    rotY += velX;
    rotX += velY;
    rotX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotX));
    prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: false });

document.addEventListener('mouseup', () => {
    if (isDragging) {
        isDragging = false;
        returningToFront = true;
    }
});

document.addEventListener('touchend', () => {
    if (isDragging) {
        isDragging = false;
        returningToFront = true;
    }
});

// ─── Render Loop ─────────────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);

    if (model) {
        if (isLoading) {
            // Constant horizontal spin while AI is responding
            autoSpinAngle += 0.04;
            model.rotation.y = rotY + autoSpinAngle;
            model.rotation.x = rotX;
        } else {
            autoSpinAngle = 0;

            if (isDragging) {
                // Live drag
                model.rotation.y = rotY;
                model.rotation.x = rotX;
            } else if (returningToFront) {
                // Let inertia run first, then ease back to 0,0
                velX *= 0.90;
                velY *= 0.90;
                rotY += velX;
                rotX += velY;

                const speed = Math.abs(velX) + Math.abs(velY);
                if (speed < 0.002) {
                    // Inertia done — now ease smoothly back to front
                    velX = 0; velY = 0;
                    rotX += (0 - rotX) * 0.04;
                    // Ease Y to nearest multiple of 2π (front face)
                    const targetY = Math.round(rotY / (Math.PI * 2)) * (Math.PI * 2);
                    rotY += (targetY - rotY) * 0.04;
                    if (Math.abs(rotX) < 0.001 && Math.abs(rotY - targetY) < 0.001) {
                        rotX = 0;
                        rotY = targetY;
                        returningToFront = false;
                    }
                }
                model.rotation.y = rotY;
                model.rotation.x = rotX;
            } else {
                // Idle — gentle inertia coast
                velX *= 0.92;
                velY *= 0.92;
                rotY += velX;
                rotX += velY;
                model.rotation.y = rotY;
                model.rotation.x = rotX;
            }
        }
    }

    renderer.render(scene, camera);
}
animate();

// ─── Expose loading control globally ─────────────────────────────────────────
window.setAvatarLoading = (state) => { isLoading = state; };

// ─── Chat Logic ───────────────────────────────────────────────────────────────
const CLOUDFLARE_WORKER_URL = 'https://smile.miyan723.workers.dev/chat';
const STORAGE_KEY = 'chat_widget_history';
const STORAGE_TIMEOUT = 10 * 60 * 1000;

const chatForm = document.querySelector('.chat-form');
const chatInput = document.querySelector('.chat-input');
const sendBtn = document.querySelector('.send-btn');
const chatMessages = document.querySelector('.chat-messages');
const resetBtn = document.querySelector('.reset-btn');

let messages = [];
let loading = false;

function loadMessages() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
        try {
            const data = JSON.parse(stored);
            if (Date.now() - data.timestamp < STORAGE_TIMEOUT) {
                messages = data.messages;
                renderMessages();
            } else {
                localStorage.removeItem(STORAGE_KEY);
            }
        } catch (e) { localStorage.removeItem(STORAGE_KEY); }
    }
}

function saveMessages() {
    if (messages.length > 0) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ messages, timestamp: Date.now() }));
    }
}

const PROMPT_TEMPLATES = [
    { label: '💰 料金について教えて', text: '料金はいくらですか？' },
    { label: '📅 スケジュールを知りたい', text: 'スケジュールを教えてください。' },
    { label: '🎌 体験レッスンはどうやるの？', text: '体験レッスンはどのように申し込めますか？' },
    { label: '📍 スマイルの場所はどこ？', text: 'スマイル英会話はどこにありますか？' },
    { label: '🏫 どんなスクールですか？', text: 'スマイル英会話はどんな英会話スクールですか？' },
];

function renderEmptyState() {
    chatMessages.innerHTML = `
        <div class="chat-empty">
            <div class="empty-icon">⚡</div>
            <p class="empty-label">何でも聞いて！</p>
            <div class="prompt-templates">
                ${PROMPT_TEMPLATES.map((t, i) => `
                    <button class="prompt-btn" data-index="${i}">${t.label}</button>
                `).join('')}
            </div>
        </div>
    `;
    chatMessages.querySelectorAll('.prompt-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tmpl = PROMPT_TEMPLATES[parseInt(btn.dataset.index)];
            chatInput.value = tmpl.text;
            chatForm.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
        });
    });
}

function renderMessages() {
    chatMessages.innerHTML = '';
    if (messages.length === 0) {
        renderEmptyState();
        return;
    }
    messages.forEach((msg) => {
        const div = document.createElement('div');
        div.className = `chat-message message-${msg.role}`;
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.textContent = msg.content;
        div.appendChild(bubble);
        chatMessages.appendChild(div);
    });
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showLoadingIndicator() {
    const div = document.createElement('div');
    div.className = 'chat-message message-assistant';
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble loading';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    div.appendChild(bubble);
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

async function sendMessage(e) {
    e.preventDefault();
    const userMessage = chatInput.value.trim();
    if (!userMessage || loading) return;

    chatInput.value = '';
    loading = true;
    sendBtn.disabled = true;
    window.setAvatarLoading(true); // Start spin

    messages.push({ role: 'user', content: userMessage });
    renderMessages();
    showLoadingIndicator();

    try {
        const response = await fetch(CLOUDFLARE_WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages, model: 'gpt-4o-mini', max_tokens: 500, temperature: 0.7 }),
        });
        if (!response.ok) throw new Error(`API error: ${response.statusText}`);
        const data = await response.json();
        const assistantMessage = data.choices[0].message.content;
        messages.push({ role: 'assistant', content: assistantMessage });
        saveMessages();
        renderMessages();
    } catch (error) {
        console.error('Chat error:', error);
        messages.push({ role: 'assistant', content: '⚠️ Sorry, something went wrong. Please check your Cloudflare Worker setup.' });
        renderMessages();
    } finally {
        loading = false;
        sendBtn.disabled = false;
        chatInput.focus();
        window.setAvatarLoading(false); // Stop spin
    }
}

function resetChat() {
    if (confirm('Clear all chat history?')) {
        messages = [];
        localStorage.removeItem(STORAGE_KEY);
        renderMessages();
    }
}

chatForm.addEventListener('submit', sendMessage);
resetBtn.addEventListener('click', resetChat);
loadMessages();
// Show templates immediately on first load if no history
if (messages.length === 0) renderEmptyState();
</script>
