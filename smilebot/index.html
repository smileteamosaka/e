<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Widget</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .chat-widget {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
            box-shadow: 0 20px 60px rgba(255, 215, 0, 0.1);
        }

        /* Header */
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            background: linear-gradient(90deg, #000000 0%, #0d0d0d 100%);
            border-bottom: 2px solid #FFD700;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.15);
        }

        .chat-header-content {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #FFD700;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
            object-fit: cover;
        }

        .chat-title-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .chat-title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #FFD700;
            letter-spacing: 0.5px;
        }

        .chat-subtitle {
            margin: 0;
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .reset-btn {
            background: #FFD700;
            color: #000000;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
            font-size: 20px;
        }

        .reset-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(255, 215, 0, 0.5);
        }

        .reset-btn:active {
            transform: scale(0.95);
        }

        /* Messages Container */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: linear-gradient(180deg, #000000 0%, #0a0a0a 100%);
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #FFD700;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #ffed4e;
        }

        .chat-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 16px;
            color: #666;
        }

        .empty-icon {
            color: #FFD700;
            opacity: 0.6;
            font-size: 40px;
        }

        /* Messages */
        .chat-message {
            display: flex;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-user {
            justify-content: flex-end;
        }

        .message-assistant {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
            word-wrap: break-word;
        }

        .message-user .message-bubble {
            background: #FFD700;
            color: #000000;
            font-weight: 500;
            border-bottom-right-radius: 2px;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.2);
        }

        .message-assistant .message-bubble {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #FFD700;
            border-bottom-left-radius: 2px;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.1);
        }

        /* Loading animation */
        .message-bubble.loading {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 12px 18px;
        }

        .message-bubble.loading span {
            width: 8px;
            height: 8px;
            background: #FFD700;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .message-bubble.loading span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .message-bubble.loading span:nth-child(2) {
            animation-delay: -0.16s;
        }

        .message-bubble.loading span:nth-child(3) {
            animation-delay: 0s;
        }

        @keyframes bounce {
            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.5;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Form */
        .chat-form {
            display: flex;
            gap: 8px;
            padding: 16px 24px;
            background: linear-gradient(90deg, #000000 0%, #0d0d0d 100%);
            border-top: 2px solid #FFD700;
            box-shadow: 0 -4px 12px rgba(255, 215, 0, 0.1);
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #FFD700;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }

        .chat-input:focus {
            border-color: #ffed4e;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
            background: #242424;
        }

        .chat-input::placeholder {
            color: #666;
        }

        .chat-input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .send-btn {
            padding: 12px 16px;
            background: #FFD700;
            color: #000000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.3);
            font-size: 18px;
        }

        .send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 215, 0, 0.5);
            background: #ffed4e;
        }

        .send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-widget {
                border-radius: 0;
            }

            .message-bubble {
                max-width: 85%;
            }

            .chat-header {
                padding: 16px 16px;
            }

            .chat-messages {
                padding: 16px 16px;
            }

            .chat-form {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-widget">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-content">
                <img src="https://via.placeholder.com/48/FFD700/000000?text=😊" alt="Chat Bot" class="chat-avatar" />
                <div class="chat-title-group">
                    <h2 class="chat-title">Chat Assistant</h2>
                    <p class="chat-subtitle">Powered by GPT-4o Mini</p>
                </div>
            </div>
            <button class="reset-btn" title="Clear chat history">🔄</button>
        </div>

        <!-- Messages -->
        <div class="chat-messages">
            <div class="chat-empty">
                <div class="empty-icon">⚡</div>
                <p>Start a conversation</p>
            </div>
        </div>

        <!-- Input -->
        <form class="chat-form">
            <input
                type="text"
                class="chat-input"
                placeholder="Type a message..."
            />
            <button type="submit" class="send-btn">📤</button>
        </form>
    </div>

    <script>
        const CLOUDFLARE_WORKER_URL = 'https://smile.miyan723.workers.dev/chat';
        const STORAGE_KEY = 'chat_widget_history';
        const STORAGE_TIMEOUT = 10 * 60 * 1000; // 10 minutes

        // DOM Elements
        const chatForm = document.querySelector('.chat-form');
        const chatInput = document.querySelector('.chat-input');
        const sendBtn = document.querySelector('.send-btn');
        const chatMessages = document.querySelector('.chat-messages');
        const resetBtn = document.querySelector('.reset-btn');

        let messages = [];
        let loading = false;

        // Load messages from localStorage on mount
        function loadMessages() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    const now = Date.now();
                    // Only load if within 10-minute window
                    if (now - data.timestamp < STORAGE_TIMEOUT) {
                        messages = data.messages;
                        renderMessages();
                    } else {
                        localStorage.removeItem(STORAGE_KEY);
                    }
                } catch (e) {
                    console.error('Failed to load chat history:', e);
                    localStorage.removeItem(STORAGE_KEY);
                }
            }
        }

        // Save messages to localStorage
        function saveMessages() {
            if (messages.length > 0) {
                localStorage.setItem(
                    STORAGE_KEY,
                    JSON.stringify({
                        messages,
                        timestamp: Date.now(),
                    })
                );
            }
        }

        // Render messages to DOM
        function renderMessages() {
            chatMessages.innerHTML = '';

            if (messages.length === 0) {
                chatMessages.innerHTML = `
                    <div class="chat-empty">
                        <div class="empty-icon">⚡</div>
                        <p>Start a conversation</p>
                    </div>
                `;
                return;
            }

            messages.forEach((msg) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `chat-message message-${msg.role}`;

                const bubble = document.createElement('div');
                bubble.className = 'message-bubble';
                bubble.textContent = msg.content;

                messageDiv.appendChild(bubble);
                chatMessages.appendChild(messageDiv);
            });

            // Auto-scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Show loading indicator
        function showLoadingIndicator() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message message-assistant';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble loading';
            bubble.innerHTML = '<span></span><span></span><span></span>';

            messageDiv.appendChild(bubble);
            chatMessages.appendChild(messageDiv);

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Send message
        async function sendMessage(e) {
            e.preventDefault();

            const userMessage = chatInput.value.trim();
            if (!userMessage || loading) return;

            chatInput.value = '';
            loading = true;
            sendBtn.disabled = true;

            // Add user message
            messages.push({ role: 'user', content: userMessage });
            renderMessages();

            // Show loading indicator
            showLoadingIndicator();

            try {
                // Call Cloudflare Worker
                const response = await fetch(CLOUDFLARE_WORKER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: messages,
                        model: 'gpt-4o-mini',
                        max_tokens: 500,
                        temperature: 0.7,
                    }),
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.statusText}`);
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;

                // Add assistant message
                messages.push({ role: 'assistant', content: assistantMessage });
                saveMessages();
                renderMessages();
            } catch (error) {
                console.error('Chat error:', error);
                messages.push({
                    role: 'assistant',
                    content: '⚠️ Sorry, something went wrong. Please check your Cloudflare Worker setup.',
                });
                renderMessages();
            } finally {
                loading = false;
                sendBtn.disabled = false;
                chatInput.focus();
            }
        }

        // Reset chat
        function resetChat() {
            if (confirm('Clear all chat history?')) {
                messages = [];
                localStorage.removeItem(STORAGE_KEY);
                renderMessages();
            }
        }

        // Event listeners
        chatForm.addEventListener('submit', sendMessage);
        resetBtn.addEventListener('click', resetChat);

        // Initialize
        loadMessages();
    </script>
</body>
</html>
