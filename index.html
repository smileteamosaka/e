<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyuu Power - Classic Edition</title>
    <style>
        /* --- 全体・背景設定 --- */
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* 全体スクロール禁止 */
            /* 背景: ご提示画像のようなヴィンテージなクリーム色 */
            background-color: #f7f4ed; 
            /* フォント: クラシックなセリフ体を基本に設定 */
            font-family: 'Playfair Display', 'Georgia', serif;
            color: #333;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 固定背景の太陽 --- */
        .background-sun {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70vh;
            height: 70vh;
            background: radial-gradient(circle, #ffe680 0%, #ffcc00 50%, rgba(255,204,0,0) 100%);
            border-radius: 50%;
            z-index: -2;
            box-shadow: 0 0 80px 30px rgba(255, 230, 0, 0.4);
            filter: blur(8px);
        }

        /* --- メインコンテナ --- */
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            justify-content: flex-start;
            align-items: center;
            position: relative;
            z-index: 1;
            padding-top: 20px;
            box-sizing: border-box;
        }

        /* --- トップ画像エリア（オリジナルサイズ維持） --- */
        .top-image-container {
            position: relative;
            width: 90%;
            max-width: 450px;
            margin-bottom: 30px;
        }

        .top-image {
            width: 100%;
            height: auto; /* オリジナルの縦横比で表示 */
            display: block;
            border-radius: 5px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        /* --- タイトル: Miyuu Power --- */
        .title {
            position: absolute;
            bottom: -20px; /* 画像の下端近くに配置 */
            left: 50%;
            transform: translateX(-50%);
            color: #ff69b4;
            font-size: 2.8rem;
            font-weight: bold;
            text-align: center;
            /* ピンクの発光をエレガントに調整 */
            text-shadow: 
                0 0 10px rgba(255, 105, 180, 0.7),
                0 0 20px rgba(255, 105, 180, 0.5);
            /* ★フォントを他と同じセリフ体（Playfair Display）に変更★ */
            font-family: 'Playfair Display', serif;
            white-space: nowrap;
            pointer-events: none;
            z-index: 2;
        }

        /* --- 3つのボタンエリア --- */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
            max-width: 280px;
            margin-top: auto;
            margin-bottom: auto;
            align-items: center;
        }

        .btn {
            background-color: #28a745;
            color: white;
            width: 100%;
            padding: 16px 0;
            text-decoration: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.15rem;
            border: none;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            animation: pulse 2s infinite;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
            display: block;
            box-sizing: border-box;
            /* フォントをセリフ体に */
            font-family: 'Playfair Display', serif;
        }

        .btn:hover {
            background-color: #218838;
            transform: scale(1.03);
            box-shadow: 0 6px 15px rgba(40, 167, 69, 0.5);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3); }
            50% { transform: scale(1.03); box-shadow: 0 4px 20px rgba(40, 167, 69, 0.5); }
            100% { transform: scale(1); box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3); }
        }

        /* --- フッター --- */
        footer {
            font-size: 0.8rem;
            color: #b01a1a; /* 深い赤 */
            padding-bottom: 20px;
            text-align: center;
            width: 100%;
            letter-spacing: 0.05rem;
            /* フォントをセリフ体に */
            font-family: 'Georgia', serif;
        }

        /* --- 画像ビューア --- */
        #viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .viewer-content {
            display: flex;
            overflow-x: auto;
            width: 100%;
            height: 100%;
            padding: 50px 0;
            gap: 0;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .viewer-item {
            flex: 0 0 100vw;
            width: 100vw;
            height: 100%;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            box-sizing: border-box;
            padding: 20px;
        }

        .viewer-item img {
            max-width: 90%;
            max-height: 70vh;
            border: 4px solid white;
            border-radius: 5px;
            object-fit: contain;
        }

        .caption {
            margin-top: 25px;
            font-style: italic;
            font-size: 1.1rem;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
            font-family: 'Playfair Display', serif;
        }

        .close-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            background: #c72c2c;
            color: white;
            border: none;
            font-size: 1.6rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 110;
        }

        .viewer-content::-webkit-scrollbar {
            display: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-sun"></div>

    <div class="container">
        <div class="top-image-container">
            <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic1.jpg.jpg" alt="Pic1" class="top-image">
            <div class="title">Miyuu Power</div>
        </div>

        <div class="button-group">
            <a href="https://hirakatajin.com" target="_blank" class="btn">hirakatajin.com</a>
            <a href="https://smilehirakata.com" target="_blank" class="btn">Smile</a>
            <button class="btn" onclick="openViewer()">my pics</button>
        </div>

        <footer>👸🏻 I am Miyuu — this is my test site</footer>
    </div>

    <div id="viewer">
        <button class="close-btn" onclick="closeViewer()">X</button>
        <div class="viewer-content">
            <div class="viewer-item">
                <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic1.jpg.jpg" alt="Pic1">
                <p class="caption">まずは基本の1枚！<br>ここから全てが始まります。</p>
            </div>
            <div class="viewer-item">
                <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic2.jpg.jpg" alt="Pic2">
                <p class="caption">2枚目は秘密のオフショット。<br>リラックスした表情です。</p>
            </div>
            <div class="viewer-item">
                <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic3.jpg.jpg" alt="Pic3">
                <p class="caption">ラストはこの1枚！<br>みんなにパワーを届けます。</p>
            </div>
        </div>
    </div>

    <script>
        function openViewer() {
            document.getElementById('viewer').style.display = 'flex';
        }
        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
        }
    </script>
</body>
</html>
