<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spreadsheet App</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        table { border-collapse: collapse; }
        td, th { border: 1px solid #ccc; padding: 5px; min-width: 50px; height: 25px; }
        .selected { border: 2px solid #2563eb !important; background-color: #eff6ff; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // --- ここから下に、あなたが書いた元のコードを貼り付けます ---
        function Spreadsheet() {
            const ROWS = 20;
            const COLS = 10;
            const COL_LABELS = Array.from({ length: COLS }, (_, i) => String.fromCharCode(65 + i));
            const [data, setData] = useState(() => Array.from({ length: ROWS }, () => Array(COLS).fill("")));
            const [selected, setSelected] = useState({ r: 0, c: 0 });

            // 簡易的な表示用の処理
            return (
                <div>
                    <h1>miyusheet</h1>
                    <table border="1">
                        <thead>
                            <tr>
                                <th></th>
                                {COL_LABELS.map(label => <th key={label}>{label}</th>)}
                            </tr>
                        </thead>
                        <tbody>
                            {data.map((row, r) => (
                                <tr key={r}>
                                    <td>{r + 1}</td>
                                    {row.map((cell, c) => (
                                        <td 
                                            key={c} 
                                            className={selected.r === r && selected.c === c ? 'selected' : ''}
                                            onClick={() => setSelected({r, c})}
                                        >
                                            {cell}
                                        </td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Spreadsheet />);
    </script>
</body>
</html>
