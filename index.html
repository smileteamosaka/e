<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyuu Power - Perfect Edition</title>
    <style>
        /* --- 全体・背景設定 --- */
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            background-color: #f7f4ed; 
            font-family: 'Playfair Display', 'Georgia', serif;
            color: #333;
            -webkit-font-smoothing: antialiased;
        }

        .background-sun {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vh;
            height: 80vh;
            background: radial-gradient(circle, #ffe680 0%, #ffcc00 50%, rgba(255,204,0,0) 100%);
            border-radius: 50%;
            z-index: -2;
            box-shadow: 0 0 80px 30px rgba(255, 230, 0, 0.4);
            filter: blur(10px);
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            justify-content: flex-start;
            align-items: center;
            position: relative;
            z-index: 1;
            padding-top: 2vh;
            box-sizing: border-box;
        }

        /* --- トップ画像（オリジナルサイズ重視） --- */
        .top-image-container {
            position: relative;
            width: 95%;
            max-width: 600px; /* PCでも少し大きめに表示されるよう調整 */
            margin-bottom: 30px;
        }

        .top-image {
            width: 100%;
            height: auto; 
            display: block;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .title {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff69b4;
            font-size: clamp(2rem, 8vw, 3.5rem); /* 画面サイズに合わせて可変 */
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff, 0 0 25px rgba(255, 105, 180, 0.9);
            font-family: 'Arial Rounded MT Bold', sans-serif;
            white-space: nowrap;
            z-index: 5;
        }

        /* --- ボタンエリア --- */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 300px;
            margin-top: 40px;
            margin-bottom: auto;
        }

        .btn {
            background-color: #28a745;
            color: white;
            width: 100%;
            padding: 16px 0;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
            animation: pulse 2.5s infinite;
            font-family: 'Playfair Display', serif;
        }

        .btn:hover { background-color: #218838; transform: scale(1.05); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        footer {
            font-size: 0.8rem;
            color: #b01a1a;
            padding-bottom: 20px;
            font-family: 'Georgia', serif;
        }

        /* --- 画像ビューア（PC/スマホ両対応） --- */
        #viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
        }

        /* PCでもスクロールできるように設定 */
        .viewer-content {
            display: flex;
            overflow-x: auto;
            width: 100%;
            height: 80vh;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            cursor: grab; /* PCで掴めるように */
        }
        .viewer-content:active { cursor: grabbing; }

        /* スクロールバーを見えやすく（PC用） */
        .viewer-content::-webkit-scrollbar {
            height: 8px;
        }
        .viewer-content::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }

        .viewer-item {
            flex: 0 0 100vw;
            width: 100vw;
            height: 100%;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .viewer-item img {
            max-width: 85%;
            max-height: 65vh;
            border: 4px solid white;
            object-fit: contain;
        }

        .caption {
            margin-top: 20px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }

        .close-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: #c72c2c;
            color: white;
            border: none;
            font-size: 1.5rem;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 110;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <div class="background-sun"></div>

    <div class="container">
        <div class="top-image-container">
            <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic1.jpg.jpg" alt="Pic1" class="top-image">
            <div class="title">Miyuu Power</div>
        </div>

        <div class="button-group">
            <a href="https://hirakatajin.com" target="_blank" class="btn">hirakatajin.com</a>
            <a href="https://smilehirakata.com" target="_blank" class="btn">Smile</a>
            <button class="btn" onclick="openViewer()">my pics</button>
        </div>

        <footer>👸🏻 I am Miyuu — this is my test site</footer>
    </div>

    <div id="viewer">
        <button class="close-btn" onclick="closeViewer()">X</button>
        <div class="viewer-content" id="viewer-scroll">
            <div class="viewer-item">
                <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic1.jpg.jpg" alt="Pic1">
                <p class="caption">1/3: Welcome to Miyuu Power!</p>
            </div>
            <div class="viewer-item">
                <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic2.jpg.jpg" alt="Pic2">
                <p class="caption">2/3: Keep Smiling Everyday.</p>
            </div>
            <div class="viewer-item">
                <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic3.jpg.jpg" alt="Pic3">
                <p class="caption">3/3: Energy for You!</p>
            </div>
        </div>
    </div>

    <script>
        function openViewer() {
            document.getElementById('viewer').style.display = 'flex';
        }
        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
        }

        // PCでのドラッグスクロール機能
        const slider = document.getElementById('viewer-scroll');
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => { isDown = false; });
        slider.addEventListener('mouseup', () => { isDown = false; });
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2; 
            slider.scrollLeft = scrollLeft - walk;
        });
    </script>
</body>
</html>
