<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 miyusheet - Special Edition 🎀</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap');

        :root {
            --pink-base: #ffdee9;
            --pink-dark: #ffafbd;
            --main-color: #ff69b4;
            --sub-color: #fff0f5;
            --border-color: #ffc0cb;
        }

        body {
            background: linear-gradient(135deg, var(--pink-base) 0%, #b5fffc 100%);
            min-height: 100vh;
            margin: 0;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.2);
            border: 4px solid #ffffff;
            max-width: 95%;
        }

        h1 {
            color: var(--main-color);
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px #ffffff;
        }

        /* テーブルのデザイン */
        .table-wrapper {
            overflow: auto;
            border-radius: 15px;
            border: 2px solid var(--border-color);
            background: white;
        }

        table {
            border-collapse: collapse;
            background: white;
        }

        th {
            background: var(--pink-dark);
            color: white;
            padding: 12px;
            font-weight: bold;
            border: 1px solid var(--border-color);
            min-width: 80px;
        }

        td {
            border: 1px solid var(--border-color);
            width: 100px;
            height: 35px;
            padding: 0;
            position: relative;
            transition: all 0.2s;
        }

        /* 行番号の列 */
        .row-index {
            background: var(--sub-color);
            color: var(--main-color);
            font-weight: bold;
            text-align: center;
            width: 40px;
        }

        /* 選択中のセル */
        .selected {
            background: #fff9fb;
            box-shadow: inset 0 0 0 2px var(--main-color);
            z-index: 5;
        }

        /* 入力ボックス */
        input {
            width: 100%;
            height: 100%;
            border: none;
            padding: 0 5px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
            background: #ffffff;
            color: #333;
            outline: none;
            text-align: center;
        }

        .footer {
            margin-top: 20px;
            color: #888;
            font-size: 0.9em;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>🎀 miyusheet 🎀</h1>
        <div id="root"></div>
    </div>

    <div class="footer">✨ セルを選んでキー入力 or ダブルクリックで編集。自動保存されるよ ✨</div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        function Spreadsheet() {
            const ROWS = 20;
            const COLS = 10;
            const COL_LABELS = Array.from({ length: COLS }, (_, i) => String.fromCharCode(65 + i));

            // 【保存機能】LocalStorageから復元
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('miyusheet_db');
                return saved ? JSON.parse(saved) : Array.from({ length: ROWS }, () => Array(COLS).fill(""));
            });

            const [selected, setSelected] = useState({ r: 0, c: 0 });
            const [editing, setEditing] = useState(false);

            // 【保存機能】データが変わるたびに実行
            useEffect(() => {
                localStorage.setItem('miyusheet_db', JSON.stringify(data));
            }, [data]);

            // 入力処理
            const updateCell = (value) => {
                const newData = [...data];
                newData[selected.r][selected.c] = value;
                setData(newData);
            };

            // キーボード操作
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (editing) {
                        if (e.key === 'Enter') setEditing(false);
                        return;
                    }

                    switch(e.key) {
                        case 'ArrowUp': setSelected(prev => ({ ...prev, r: Math.max(0, prev.r - 1) })); break;
                        case 'ArrowDown': setSelected(prev => ({ ...prev, r: Math.min(ROWS - 1, prev.r + 1) })); break;
                        case 'ArrowLeft': setSelected(prev => ({ ...prev, c: Math.max(0, prev.c - 1) })); break;
                        case 'ArrowRight': setSelected(prev => ({ ...prev, c: Math.min(COLS - 1, prev.c + 1) })); break;
                        case 'Enter': setEditing(true); e.preventDefault(); break;
                        case 'Backspace': updateCell(""); break;
                        default:
                            if (e.key.length === 1) { // 文字が打たれたら即入力開始
                                setEditing(true);
                                updateCell(e.key);
                            }
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [selected, editing, data]);

            return (
                <div className="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>♡</th>
                                {COL_LABELS.map(l => <th key={l}>{l}</th>)}
                            </tr>
                        </thead>
                        <tbody>
                            {data.map((row, r) => (
                                <tr key={r}>
                                    <td className="row-index">{r + 1}</td>
                                    {row.map((cell, c) => (
                                        <td 
                                            key={c}
                                            className={selected.r === r && selected.c === c ? 'selected' : ''}
                                            onClick={() => { setSelected({r, c}); setEditing(false); }}
                                            onDoubleClick={() => setEditing(true)}
                                        >
                                            {editing && selected.r === r && selected.c === c ? (
                                                <input 
                                                    autoFocus
                                                    value={cell}
                                                    onChange={(e) => updateCell(e.target.value)}
                                                    onBlur={() => setEditing(false)}
                                                />
                                            ) : (
                                                <div style={{textAlign: 'center', width: '100%'}}>{cell}</div>
                                            )}
                                        </td>
                                    ))}
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Spreadsheet />);
    </script>
</body>
</html>
