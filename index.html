<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyu Power</title>
    <style>
        /* 基本設定: スクロール禁止 */
        html, body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            background-color: white;
            font-family: 'Arial', sans-serif;
        }

        /* 固定背景: 巨大な発光する黄色の球体 */
        .background-sun {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70vh;
            height: 70vh;
            background: radial-gradient(circle, #fff700 0%, #ffcc00 50%, #ffaa00 100%);
            border-radius: 50%;
            z-index: -1;
            box-shadow: 0 0 100px 40px rgba(255, 230, 0, 0.8);
            filter: blur(2px);
        }

        /* コンテンツ配置 */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: space-between;
            position: relative;
        }

        /* トップ画像エリア */
        .top-image-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
        }

        .top-image {
            width: 100%;
            border-radius: 15px;
            display: block;
        }

        /* タイトル: Pink Bubble Text */
        .title {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff69b4;
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 
                3px 3px 0px #fff, 
                -3px -3px 0px #fff, 
                3px -3px 0px #fff, 
                -3px 3px 0px #fff,
                5px 5px 15px rgba(255, 105, 180, 0.5);
            font-family: 'Comic Sans MS', 'Arial', sans-serif; /* Fancy感を出すため */
            white-space: nowrap;
            pointer-events: none;
        }

        /* ボタンエリア */
        .button-group {
            display: flex;
            gap: 20px;
            z-index: 10;
        }

        .btn {
            background-color: #28a745;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            animation: pulse 2s infinite;
        }

        .btn:hover {
            transform: scale(1.1) rotate(2deg);
            background-color: #218838;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(40, 167, 69, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }

        /* フッター */
        footer {
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: #555;
        }

        /* 画像ビューア（オーバーレイ） */
        #viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .viewer-content {
            display: flex;
            overflow-x: auto;
            width: 90%;
            padding: 20px;
            gap: 20px;
            scroll-snap-type: x mandatory;
        }

        .viewer-item {
            flex: 0 0 auto;
            scroll-snap-align: center;
            text-align: center;
            color: white;
        }

        .viewer-item img {
            max-height: 60vh;
            border: 5px solid white;
            border-radius: 10px;
        }

        .caption {
            margin-top: 15px;
            font-style: italic;
            font-size: 1.2rem;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: red;
            color: white;
            border: none;
            font-size: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 110;
        }
    </style>
</head>
<body>

    <div class="background-sun"></div>

    <div class="container">
        <div class="top-image-container">
            <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic1.jpg.jpg" alt="Top Image" class="top-image">
            <div class="title">Miyu Power</div>
        </div>

        <div class="button-group">
            <a href="https://hirakatajin.com" target="_blank" class="btn">hirakatajin.com</a>
            <a href="https://smilehirakata.com" target="_blank" class="btn">Smile</a>
            <button class="btn" onclick="openViewer()">my pics</button>
        </div>

        <footer>👸🏻I am Miyu - this is my test site</footer>
    </div>

    <div id="viewer">
        <button class="close-btn" onclick="closeViewer()">X</button>
        <div class="viewer-content">
            <div class="viewer-item">
                <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic1.jpg.jpg" alt="Pic 1">
                <p class="caption">まずは基本の1枚！パワーがみなぎっています。</p>
            </div>
            <div class="viewer-item">
                <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic2.jpg" alt="Pic 2">
                <p class="caption">2枚目は秘密のオフショット…かもしれません。</p>
            </div>
            <div class="viewer-item">
                <img src="https://raw.githubusercontent.com/miyuvinny/photos/main/pic3.jpg" alt="Pic 3">
                <p class="caption">ラストを飾るのはこの1枚！笑顔になれますように。</p>
            </div>
        </div>
    </div>

    <script>
        function openViewer() {
            document.getElementById('viewer').style.display = 'flex';
        }
        function closeViewer() {
            document.getElementById('viewer').style.display = 'none';
        }
    </script>
</body>
</html>
