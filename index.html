<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miyuu Power - Scroll Edition</title>
    <style>
        /* --- 全体設定: スクロールを許可 --- */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden; /* 横揺れ防止 */
            overflow-y: auto; /* 縦スクロールを許可 */
            background-color: #f7f4ed; /* ヴィンテージクリーム */
            font-family: 'Playfair Display', 'Georgia', serif;
            color: #333;
            -webkit-font-smoothing: antialiased;
        }

        /* --- 固定背景の太陽: スクロールしても位置が変わらない --- */
        .background-sun {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vh;
            height: 80vh;
            background: radial-gradient(circle, #ffe680 0%, #ffcc00 50%, rgba(255,204,0,0) 100%);
            border-radius: 50%;
            z-index: -2;
            box-shadow: 0 0 80px 30px rgba(255, 230, 0, 0.4);
            filter: blur(10px);
        }

        /* --- メインコンテナ --- */
        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            align-items: center;
            position: relative;
            z-index: 1;
            padding: 20px 0; /* 上下の余白 */
            box-sizing: border-box;
        }

        /* --- トップ画像エリア（完全オリジナルサイズ） --- */
        .top-image-container {
            position: relative;
            width: 95%;
            max-width: 600px; /* PCでの最大幅 */
            margin-bottom: 50px; /* タイトル下のボタンとの間隔 */
        }

        .top-image {
            width: 100%;
            height: auto; /* オリジナルの比率 */
            display: block;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* --- タイトル: Miyuu Power（セリフ体） --- */
        .title {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff69b4;
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: bold;
            text-align: center;
            text-shadow: 
                0 0 10px rgba(255, 105, 180, 0.7),
                0 0 20px rgba(255, 105, 180, 0.4);
            font-family: 'Playfair Display', serif;
            white-space: nowrap;
            pointer-events: none;
            z-index: 2;
        }

        /* --- 3つのボタンエリア --- */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
            max-width: 300px;
            margin-top: 20px;
            margin-bottom: 60px; /* フッターとの間隔 */
            align-items: center;
        }

        .btn {
            background-color: #28a745;
            color: white;
            width: 100%;
            padding: 18px 0;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            border: none;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            animation: pulse 2.5s infinite;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
            display: block;
            box-sizing: border-box;
            font-family: 'Playfair Display', serif;
        }

        .btn:hover {
            background-color: #218838;
            transform: scale(1.05);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* --- フッター --- */
        footer {
            font-size: 0.9rem;
            color: #b01a1a;
            padding: 40px 0;
            text-align: center;
            width: 100%;
            font-family: 'Georgia', serif;
        }

        /* --- 画像ビューア --- */
        #viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .viewer-content {
            display: flex;
            overflow-x: auto;
            width: 100%;
            height: 100%;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            cursor: grab;
        }
        .viewer-content:active { cursor: grabbing; }

        .viewer-item {
            flex: 0 0 100vw;
            width: 100vw;
            height: 100%;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
            box-sizing: border-box;
        }

        .viewer-item img {
            max-width: 90%;
            max-height: 75vh;
            border: 4px solid white;
            object-fit: contain;
        }

        .caption {
            margin-top: 25px;
            font-style: italic;
            font-size: 1.1rem;
            font-family: 'Playfair Display', serif;
        }

        .close-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: #c72c2c;
            color: white;
            border: none;
            font-size: 1.6rem;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 110;
        }

        /* スクロールバー非表示（ビューア内） */
        .viewer-content::-webkit-scrollbar { display: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
</head>
